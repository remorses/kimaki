name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install opencode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Verify opencode
        run: opencode --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Submodules have dist/ gitignored so they need to be built after checkout.
      # errore, traforo, and opencode-injection-guard are workspace deps of discord.
      - name: Build submodules (errore, traforo, opencode-injection-guard)
        run: |
          pnpm --filter errore run build
          pnpm --filter traforo run build
          pnpm --filter opencode-injection-guard run build

      - name: Generate Prisma + SQL (discord-digital-twin)
        run: pnpm generate
        working-directory: discord-digital-twin

      - name: Generate Prisma + SQL (discord)
        run: pnpm generate
        working-directory: discord

      - name: Build discord-digital-twin
        run: pnpm build
        working-directory: discord-digital-twin

      - name: Run tests
        run: pnpm test -- --run
        working-directory: discord
        env:
          NODE_ENV: test

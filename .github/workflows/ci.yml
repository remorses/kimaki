name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install opencode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Verify opencode
        run: opencode --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Submodules have dist/ gitignored so they need to be built after checkout.
      # libsqlproxy is a workspace package that also needs building (exports from dist/).
      - name: Build workspace packages with dist/ exports
        run: |
          pnpm --filter errore run build
          pnpm --filter traforo run build
          pnpm --filter opencode-injection-guard run build
          pnpm --filter libsqlproxy run build

      - name: Generate Prisma + SQL (discord-digital-twin)
        run: pnpm generate
        working-directory: discord-digital-twin

      - name: Generate Prisma + SQL (discord)
        run: pnpm generate
        working-directory: discord

      - name: Build discord-digital-twin
        run: pnpm build
        working-directory: discord-digital-twin

      # Excluded tests: question tool interaction and queue ordering tests
      # that consistently fail on CI due to event delivery timing differences
      # (pending question cleanup races, reply ordering under slower I/O).
      # These pass locally where event delivery is faster.
      - name: Run tests
        run: >-
          pnpm test -- --run --retry 1
          --exclude src/queue-advanced-question.e2e.test.ts
          --exclude src/queue-question-select-drain.e2e.test.ts
          --exclude src/thread-message-queue.e2e.test.ts
        working-directory: discord
        env:
          NODE_ENV: test

# CI for usecomputer: build native binaries for macOS (arm64 + x64)
# and Linux x64, then publish to npm on push to main.
#
# macOS targets are cross-compiled on a single macOS runner.
# Linux x64 is built natively on ubuntu because linkSystemLibrary
# needs X11/Xext/Xtst/png headers.

name: usecomputer CI

on:
  push:
    branches: [main]
    paths:
      - "usecomputer/**"
      - ".github/workflows/usecomputer-ci.yml"
  workflow_dispatch:

concurrency:
  group: usecomputer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: usecomputer

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm build

      - name: Build macOS native (arm64 + x64)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: cd usecomputer && pnpm tsx scripts/build.ts darwin-arm64 darwin-x64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            usecomputer/dist/darwin-arm64/
            usecomputer/dist/darwin-x64/

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usecomputer

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install X11 and PNG dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxtst-dev libpng-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Linux native (x64)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: cd usecomputer && pnpm tsx scripts/build.ts linux-x64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: usecomputer/dist/linux-x64/

  publish:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: usecomputer
        run: pnpm install

      - name: Build TypeScript
        working-directory: usecomputer
        run: pnpm build

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: usecomputer/dist/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: usecomputer/dist/

      - name: Check if version is already published
        id: version-check
        working-directory: usecomputer
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm show usecomputer version 2>/dev/null || echo "0.0.0")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $PACKAGE_VERSION (current: $PUBLISHED_VERSION)"
          fi

      - name: List dist contents
        working-directory: usecomputer
        run: ls -laR dist/

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        working-directory: usecomputer
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# CI for usecomputer: build native Zig binaries on each platform's
# own runner, then publish to npm on push to main.
#
# - darwin-arm64: macos-latest (Apple Silicon)
# - darwin-x64:  macos-13 (Intel)
# - linux-x64:   ubuntu-latest (needs X11/Xext/Xtst/png headers)

name: usecomputer CI

on:
  push:
    branches: [main]
    paths:
      - "usecomputer/**"
      - ".github/workflows/usecomputer-ci.yml"
  workflow_dispatch:

concurrency:
  group: usecomputer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
          - target: darwin-x64
            os: macos-13
          - target: linux-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Linux dev headers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxtst-dev libpng-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: usecomputer
        run: pnpm install

      - name: Build native (${{ matrix.target }})
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: cd usecomputer && pnpm tsx scripts/build.ts ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: usecomputer/dist/${{ matrix.target }}/

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: usecomputer
        run: pnpm install

      - name: Build TypeScript
        working-directory: usecomputer
        run: pnpm build

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: usecomputer/dist/
          merge-multiple: false

      # download-artifact with pattern creates dist-<target>/<files> dirs,
      # flatten them into dist/<target>/<files> for the package layout
      - name: Arrange native binaries
        working-directory: usecomputer
        run: |
          for dir in dist/dist-*/; do
            target=$(basename "$dir" | sed 's/^dist-//')
            mkdir -p "dist/$target"
            cp -r "$dir"* "dist/$target/"
            rm -rf "$dir"
          done

      - name: Check if version is already published
        id: version-check
        working-directory: usecomputer
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm show usecomputer version 2>/dev/null || echo "0.0.0")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $PACKAGE_VERSION (current: $PUBLISHED_VERSION)"
          fi

      - name: List dist contents
        working-directory: usecomputer
        run: ls -laR dist/

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        working-directory: usecomputer
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
